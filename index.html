<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="見積アプリ">
<meta name="theme-color" content="#ffffff">
<title>見積アプリ</title>
<style>
  :root {
    --primary: #1a73e8;
    --primary-bg: #e8f0fe;
    --danger: #d93025;
    --danger-bg: #fce8e6;
    --success: #188038;
    --success-bg: #e6f4ea;
    --border: #e0e0e0;
    --text: #202124;
    --muted: #5f6368;
    --hint: #9aa0a6;
    --bg: #f8f9fa;
    --card: #ffffff;
    --radius: 12px;
    --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --primary: #8ab4f8;
      --primary-bg: #1a2744;
      --border: #3c4043;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --hint: #5f6368;
      --bg: #202124;
      --card: #292a2d;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); font-size: 16px; }

  /* Layout */
  .app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
  .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 10; flex: 0 0 auto; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; padding-bottom: 80px; }
  .tab-bar { background: var(--card); border-top: 1px solid var(--border); display: flex; position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; padding-bottom: env(safe-area-inset-bottom); }
  .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 4px; font-size: 11px; color: var(--hint); cursor: pointer; border: none; background: transparent; }
  .tab-item.active { color: var(--primary); }
  .tab-item svg { width: 24px; height: 24px; }

  /* Cards */
  .card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
  .card-title { font-size: 14px; font-weight: 600; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Form */
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 5px; }
  input[type=text], input[type=number], input[type=date], textarea, select {
    width: 100%; padding: 11px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 16px; color: var(--text); background: var(--bg); outline: none; appearance: none; -webkit-appearance: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-bg); }
  input::placeholder, textarea::placeholder { color: var(--hint); opacity: 1; }
  textarea { resize: none; min-height: 80px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Items */
  .items-list { display: flex; flex-direction: column; gap: 10px; }
  .item-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; }
  .item-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .item-top input { flex: 1; }
  .item-nums { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 6px; }
  .item-subtotal { text-align: right; font-size: 14px; font-weight: 600; color: var(--primary); }
  .btn-del { width: 36px; height: 36px; min-width: 36px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--card); color: var(--muted); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  /* Totals */
  .totals { border-top: 1px solid var(--border); padding-top: 14px; margin-top: 4px; }
  .total-row { display: flex; justify-content: space-between; align-items: center; font-size: 15px; margin-bottom: 8px; }
  .total-row.grand { font-size: 20px; font-weight: 700; border-top: 1px solid var(--border); padding-top: 10px; margin-top: 4px; color: var(--primary); }
  .tax-select { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .tax-select label { margin: 0; white-space: nowrap; }
  .tax-select select { width: auto; }

  /* Buttons */
  .btn { padding: 13px 20px; border-radius: var(--radius-sm); font-size: 16px; font-weight: 600; cursor: pointer; border: none; width: 100%; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
  .btn-add { background: var(--primary-bg); color: var(--primary); border: none; border-radius: var(--radius-sm); padding: 12px; font-size: 15px; font-weight: 600; width: 100%; cursor: pointer; }
  .actions { display: flex; gap: 10px; }
  .actions .btn { flex: 1; }

  .field-actions { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
  .mini-btn { display:inline-flex; align-items:center; justify-content:center; padding:10px 12px; border:1px solid var(--border); border-radius: var(--radius-sm); background: var(--card); color: var(--text); font-size:14px; font-weight:600; cursor:pointer; text-decoration:none; }
  .mini-btn:disabled { opacity:.5; cursor:not-allowed; }

  /* History */
  .history-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .hc-left .client { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
  .hc-left .date { font-size: 12px; color: var(--hint); }
  .hc-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .hc-amount { font-size: 16px; font-weight: 700; color: var(--primary); }
  .btn-del-hist { font-size: 12px; padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--hint); cursor: pointer; }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--hint); font-size: 15px; }

  .history-tools { display:flex; gap:10px; margin-bottom:12px; }
  .history-tools .btn { width:auto; flex:1; }
  .history-note { font-size:12px; color: var(--hint); margin-bottom: 10px; }
  .status-chip { display:inline-block; font-size:11px; padding:3px 8px; border-radius:999px; background: var(--primary-bg); color: var(--primary); margin-bottom: 6px; }
  .history-meta { font-size: 12px; color: var(--hint); margin-top: 2px; }

  /* Tap / Active feedback — :active + JSクラスの二段構え（iPad対応） */
  .btn, .btn-add, .btn-del, .btn-del-hist, .mini-btn, .tab-item, .history-card {
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary, .btn-secondary, .btn-add, .btn-del, .btn-del-hist, .mini-btn {
    transition: transform 0.1s ease, background 0.1s ease, box-shadow 0.1s ease, filter 0.1s ease, opacity 0.1s ease;
  }
  /* CSS :active（PCブラウザ・一部スマホ） */
  .btn-primary:active,  .btn-primary.pressing  { background:#0d47a1; transform:scale(0.93); box-shadow:inset 0 3px 12px rgba(0,0,0,0.4); filter:brightness(0.82); }
  .btn-secondary:active,.btn-secondary.pressing { background:#b0b2b4; transform:scale(0.93); box-shadow:inset 0 3px 8px rgba(0,0,0,0.22); filter:brightness(0.86); }
  .btn-add:active,      .btn-add.pressing       { background:#9ab8f4; transform:scale(0.96); }
  .btn-del:active,      .btn-del.pressing       { background:#c0c0c0; transform:scale(0.86); }
  .btn-del-hist:active, .btn-del-hist.pressing  { background:#c8cacc; transform:scale(0.88); }
  .mini-btn:active,     .mini-btn.pressing      { background:#c8cacc; transform:scale(0.91); }
  .tab-item { transition: transform 0.1s ease, opacity 0.1s ease; }
  .tab-item:active, .tab-item.pressing { transform:scale(0.80); opacity:0.55; }
  .history-card { transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.1s ease; }
  .history-card:active, .history-card.pressing { transform:scale(0.982); background:#eef2ff; box-shadow:inset 0 1px 5px rgba(0,0,0,0.10); }

  /* Toast */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #323232; color: #fff; padding: 10px 20px; border-radius: 24px; font-size: 14px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  /* ---- 電子サイン ---- */
  .sign-wrap { position:relative; border:2px dashed var(--border); border-radius:var(--radius-sm); background:#fafafa; overflow:hidden; touch-action:none; }
  .sign-canvas { display:block; width:100%; cursor:crosshair; }
  .sign-placeholder { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--hint); font-size:14px; pointer-events:none; transition:opacity .2s; }
  .sign-actions { display:flex; gap:8px; margin-top:8px; }
  .sign-done-badge { display:inline-flex; align-items:center; gap:5px; font-size:13px; color:var(--success); font-weight:600; padding:6px 12px; background:var(--success-bg); border-radius:999px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1 id="header-title">見積入力</h1>
    <button id="header-btn" onclick="newEstimate()" style="background:transparent;border:none;color:var(--primary);font-size:15px;font-weight:600;cursor:pointer;padding:4px 8px;">新規</button>
  </div>
  <div class="content" id="content"></div>
  <div class="tab-bar">
    <button class="tab-item active" id="tab-form-btn" onclick="switchTab('form')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      入力
    </button>
    <button class="tab-item" id="tab-history-btn" onclick="switchTab('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span id="tab-history-label">履歴</span>
    </button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby-jCAKtGeP7DYBqEh2J6jCpiWolIn8V9oajx2_0vPzfjGuHgzTMYBBFrZk4PS1SBc/exec";
const APP_BASE_URL = location.href.split('?')[0];
const STARTUP_PARAMS = new URLSearchParams(location.search);
const IS_PUBLIC_PDF_MODE = STARTUP_PARAMS.get('public') === '1';
let currentTab = 'form';
let items = [];
let estimates = [];
let remoteEstimates = [];
let historyLoading = false;
let historyError = '';
let currentHistorySource = 'local';
let editingRecordId = '';
let editingRecordSource = '';
let customerSignDataUrl = ''; // お客様電子サインのBase64

// 入力中フォームの一時保存
let draftState = {
  client: '', clientAddress: '', serviceClient: '', serviceAddress: '',
  phone: '', email: '', staff: '', workDate: '', workTime: '', expiry: '', notes: '',
  customerSign: ''
};

try { estimates = JSON.parse(localStorage.getItem('est_v2') || '[]'); } catch(e) {}

function fmt(n) { return '¥' + Math.round(Number(n) || 0).toLocaleString('ja-JP'); }
function num(v) {
  if (v === null || v === undefined || v === '') return 0;
  return Number(String(v).replace(/[^\d.-]/g, '')) || 0;
}
function hasWebAppUrl() { return WEB_APP_URL && !WEB_APP_URL.includes('PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE'); }
function getActiveHistoryRecords() { return currentHistorySource === 'remote' ? remoteEstimates : estimates; }
function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function isEditingRemote() { return editingRecordSource === 'remote' && !!editingRecordId; }
function updatePhoneLink() {
  const phoneInput = document.getElementById('phone');
  const phoneLink = document.getElementById('phone-link');
  if (!phoneInput || !phoneLink) return;
  const raw = phoneInput.value || '';
  const dial = raw.replace(/[^\d+]/g, '');
  phoneLink.href = dial ? `tel:${dial}` : '#';
  phoneLink.style.pointerEvents = dial ? 'auto' : 'none';
  phoneLink.style.opacity = dial ? '1' : '.5';
}
function getSaveButtonLabel() { return isEditingRemote() ? '更新' : '保存'; }
function getEditStatusHtml() {
  if (!isEditingRemote()) return '';
  return `<div class="card" style="border-color:var(--primary);background:var(--primary-bg);">
    <div class="card-title" style="color:var(--primary);margin-bottom:6px;">編集中</div>
    <div style="font-size:14px;">クラウド履歴の見積を編集中です。保存するとスプレッドシートの同じ行を更新します。</div>
  </div>`;
}
function clearEditingState() {
  editingRecordId = '';
  editingRecordSource = '';
}

function saveDraft() {
  const fields = ['client','clientAddress','serviceClient','serviceAddress',
                  'phone','email','staff','workDate','workTime','expiry','notes'];
  fields.forEach(id => {
    const el = document.getElementById(id);
    if (el) draftState[id] = el.value;
  });
  draftState.customerSign = customerSignDataUrl;
}

function switchTab(tab) {
  if (currentTab === 'form') saveDraft();
  currentTab = tab;
  document.getElementById('tab-form-btn').classList.toggle('active', tab === 'form');
  document.getElementById('tab-history-btn').classList.toggle('active', tab === 'history');
  document.getElementById('header-title').textContent = tab === 'form' ? '見積入力' : '履歴';
  document.getElementById('header-btn').style.display = tab === 'form' ? '' : 'none';
  render();
}

function newEstimate() {
  if (!confirm('入力中の内容をクリアして新規作成しますか？')) return;
  clearEditingState();
  draftState = {
    client: '', clientAddress: '', serviceClient: '', serviceAddress: '',
    phone: '', email: '', staff: '', workDate: '', workTime: '', expiry: '', notes: '',
    customerSign: ''
  };
  customerSignDataUrl = '';
  items = [{ id: 1, name: '', place: '', qty: 1, price: '' }];
  render();
  document.getElementById('client').value = '';
  document.getElementById('clientAddress').value = '';
  document.getElementById('serviceClient').value = '';
  document.getElementById('serviceAddress').value = '';
  document.getElementById('phone').value = '';
  document.getElementById('email').value = '';
  document.getElementById('staff').value = '';
  document.getElementById('workDate').value = '';
  document.getElementById('workTime').value = '';
  document.getElementById('expiry').value = '';
  document.getElementById('notes').value = '';
  calcTotals();
  updatePhoneLink();
  updateEmailCopyState();
}

function render() {
  if (currentTab === 'form') renderForm();
  else renderHistory();
  updateHistoryBadge();
}

function renderForm() {
  const c = document.getElementById('content');
  // DOM が残っていればそちらを優先、なければ draftState から復元
  function pick(id) {
    const el = document.getElementById(id);
    return el ? el.value : (draftState[id] || '');
  }
  const savedClient        = pick('client');
  const savedClientAddress = pick('clientAddress');
  const savedServiceClient = pick('serviceClient');
  const savedServiceAddress= pick('serviceAddress');
  const savedPhone         = pick('phone');
  const savedEmail         = pick('email');
  const savedStaff         = pick('staff');
  const savedWorkDate      = pick('workDate');
  const savedWorkTime      = pick('workTime');
  const savedExpiry        = pick('expiry');
  const savedNotes         = pick('notes');

  c.innerHTML = `
    ${getEditStatusHtml()}
    <div class="card">
      <div class="card-title">基本情報</div>
      <div class="field"><label>ご契約お客様名</label><input type="text" id="client" placeholder="ご契約お客様名" value="${savedClient}"></div>
      <div class="field"><label>ご契約お客様住所</label><input type="text" id="clientAddress" placeholder="ご契約先住所を入力" value="${savedClientAddress}"></div>
      <div class="field"><label>サービス先お客様名</label><input type="text" id="serviceClient" placeholder="サービス提供先名を入力" value="${savedServiceClient}"></div>
      <div class="field"><label>サービス先住所</label><input type="text" id="serviceAddress" placeholder="サービス先住所を入力" value="${savedServiceAddress}"></div>
      <div class="row2">
        <div class="field"><label>電話番号</label><input type="text" id="phone" placeholder="09012345678 または 090-1234-5678" value="${savedPhone}"><div style="margin-top:6px;font-size:12px;color:var(--muted);">
          <a id="phone-link" href="${savedPhone ? 'tel:' + String(savedPhone).replace(/[^\d+]/g,'') : '#'}" style="color:var(--primary);text-decoration:none;pointer-events:${savedPhone ? 'auto' : 'none'};opacity:${savedPhone ? '1' : '.5'};">電話をかける</a>
        </div></div>
        <div class="field"><label>見積担当者</label><input type="text" id="staff" placeholder="担当者名を入力" value="${savedStaff}"></div>
      </div>
      <div class="row2">
        <div class="field"><label>作業日</label><input type="date" id="workDate" value="${savedWorkDate}"></div>
        <div class="field"><label>作業時間</label><input type="text" id="workTime" placeholder="例：9:00〜12:00" value="${savedWorkTime}"></div>
      </div>
      <div class="row2">
        <div class="field"><label>メールアドレス</label><input type="text" id="email" placeholder="example@example.com" value="${savedEmail}"><div style="margin-top:6px;font-size:12px;color:var(--muted);"><a id="copy-email-link" href="#" onclick="return copyEmailAddress(event)" style="color:var(--primary);text-decoration:none;pointer-events:${savedEmail ? 'auto' : 'none'};opacity:${savedEmail ? '1' : '.5'};">コピー</a></div></div>
        <div class="field"><label>有効期限</label><input type="date" id="expiry" value="${savedExpiry}"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">明細</div>
      <div class="items-list" id="items-list"></div>
      <button class="btn-add" onclick="addItem()" style="margin-top:10px;">＋ 品目を追加</button>
      <div class="totals">
        <div class="total-row"><span style="color:var(--muted)">税抜金額</span><span id="t-sub">¥0</span></div>
        <div class="total-row"><span id="t-taxlabel" style="color:var(--muted)">内消費税（10%）</span><span id="t-tax">¥0</span></div>
        <div class="total-row grand"><span>税込合計</span><span id="t-grand">¥0</span></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">備考・メモ</div>
      <textarea id="notes" placeholder="支払条件、納期など">${savedNotes}</textarea>
    </div>

    <div class="card">
      <div style="display:flex;align-items:center;justify-content:flex-start;gap:16px;margin-bottom:0;">
        <a id="sign-toggle-link" href="#" onclick="return toggleSignPanel(event)"
           style="color:var(--primary);font-size:13px;font-weight:600;text-decoration:none;pointer-events:auto;opacity:1;">
          お客様サイン<span id="sign-toggle-arrow" style="margin-left:4px;font-size:11px;">▼</span>
        </a>
      </div>
      <div id="sign-panel" style="display:none;margin-top:12px;">
        <div style="font-size:13px;color:var(--muted);margin-bottom:10px;">下の枠内に指でサインしてください</div>
        <div class="sign-wrap" id="sign-wrap">
          <canvas class="sign-canvas" id="sign-canvas" height="160"></canvas>
          <div class="sign-placeholder" id="sign-placeholder">ここにサイン</div>
        </div>
        <div class="sign-actions">
          <button class="mini-btn" onclick="clearSign()" style="flex:1;">クリア</button>
          <div id="sign-status"></div>
        </div>
      </div>
    </div>

    <div class="actions" style="margin-bottom:8px">
      <button class="btn btn-secondary" onclick="saveEstimate()">${getSaveButtonLabel()}</button>
      <button class="btn btn-primary" onclick="showPdfTypeModal()">PDF出力</button>
    </div>
  `;

  renderItems();
  calcTotals();
  // サインパネルは閉じた状態で開始するため initSignCanvas は開いた時に呼ぶ
  const phoneInput = document.getElementById('phone');
  const phoneLink = document.getElementById('phone-link');
  if (phoneInput && phoneLink) {
    updatePhoneLink();
    phoneInput.addEventListener('input', updatePhoneLink);
    phoneInput.addEventListener('change', updatePhoneLink);
  }
  const emailInput = document.getElementById('email');
  const copyEmailLink = document.getElementById('copy-email-link');
  if (emailInput && copyEmailLink) {
    updateEmailCopyState();
    emailInput.addEventListener('input', updateEmailCopyState);
    emailInput.addEventListener('change', updateEmailCopyState);
  }
}

function renderItems() {
  const list = document.getElementById('items-list');
  if (!list) return;
  list.innerHTML = items.map((item, idx) => `
    <div class="item-card">
      <div class="item-top">
        <input type="text" placeholder="品名" value="${item.name}" oninput="updateItem(${idx},'name',this.value)" style="flex:1">
        <button class="btn-del" onclick="removeItem(${idx})">×</button>
      </div>
      <div class="field" style="margin:0 0 8px 0"><label>サービス箇所</label><input type="text" value="${item.place || ''}" oninput="updateItem(${idx},'place',this.value)"></div>
      <div class="item-nums">
        <div class="field" style="margin:0"><label>数量</label><input type="number" min="0" step="1" value="${item.qty}" oninput="updateItem(${idx},'qty',this.value)"></div>
        <div class="field" style="margin:0"><label>単価（税込）</label><input type="number" min="0" step="1" value="${item.price || ''}" oninput="updateItem(${idx},'price',this.value)"></div>
      </div>
      <div class="item-subtotal">${fmt(item.qty * item.price)}</div>
    </div>
  `).join('');
}

function updateItem(idx, field, val) {
  items[idx][field] = (field === 'name' || field === 'place') ? val : (parseFloat(val) || 0);
  const list = document.getElementById('items-list');
  if (list) {
    const cards = list.querySelectorAll('.item-card');
    if (cards[idx]) {
      cards[idx].querySelector('.item-subtotal').textContent = fmt(items[idx].qty * items[idx].price);
    }
  }
  calcTotals();
}

function addItem() {
  items.push({ id: Date.now(), name: '', place: '', qty: 1, price: '' });
  renderItems();
  calcTotals();
  const emailInput = document.getElementById('email');
  if (emailInput) {
    emailInput.addEventListener('input', updateEmailCopyState);
    emailInput.addEventListener('change', updateEmailCopyState);
  }
  updateEmailCopyState();
}

function removeItem(idx) {
  if (items.length === 1) { showToast('最低1行は必要です'); return; }
  items.splice(idx, 1);
  renderItems();
  calcTotals();
}

function calcTotals() {
  const total = items.reduce((s, i) => s + i.qty * i.price, 0);
  const base = Math.round(total / 1.1);
  const tax = total - base;
  const tSub = document.getElementById('t-sub');
  const tTax = document.getElementById('t-tax');
  const tGrand = document.getElementById('t-grand');
  const tLabel = document.getElementById('t-taxlabel');
  if (tSub) tSub.textContent = fmt(base);
  if (tTax) tTax.textContent = fmt(tax);
  if (tGrand) tGrand.textContent = fmt(total);
  if (tLabel) tLabel.textContent = '内消費税（10%）';
}


async function loadRemoteHistory(force = false) {
  if (!hasWebAppUrl()) {
    historyError = 'WebアプリURLが未設定です。';
    return;
  }
  if (historyLoading) return;
  if (!force && remoteEstimates.length > 0) return;

  historyLoading = true;
  historyError = '';
  if (currentTab === 'history') renderHistory();

  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 12000);
    const joiner = WEB_APP_URL.includes('?') ? '&' : '?';
    const url = WEB_APP_URL + joiner + 'mode=list&_ts=' + Date.now();
    const res = await fetch(url, {
      method: 'GET',
      signal: controller.signal,
      cache: 'no-store',
      redirect: 'follow'
    });
    clearTimeout(timer);

    if (!res.ok) throw new Error('HTTP ' + res.status);

    const rawText = await res.text();
    let data;
    try {
      data = JSON.parse(rawText);
    } catch (parseError) {
      throw new Error('履歴の応答をJSONとして読めませんでした');
    }

    if (!data || !data.ok) throw new Error((data && data.message) || '履歴取得に失敗しました');
    remoteEstimates = Array.isArray(data.estimates) ? data.estimates : [];
    currentHistorySource = 'remote';
    historyError = '';
  } catch (error) {
    historyError = 'クラウド履歴を取得できませんでした。URL設定かデプロイを確認してください。';
    remoteEstimates = [];
    currentHistorySource = 'local';
    console.error('loadRemoteHistory error:', error);
  } finally {
    historyLoading = false;
    updateHistoryBadge();
    if (currentTab === 'history') renderHistory();
  }
}

function normalizeLoadedEstimate(est) {
  const total = num(est.grandTotal || est.grand_total || est.grand || est['税込合計'] || 0);
  return {
    ...est,
    id: est.id || Date.now(),
    date: est.date || est.saved_date || '',
    client: est.client || '',
    clientAddress: est.clientAddress || est.client_address || '',
    serviceClient: est.serviceClient || est.service_client || '',
    serviceAddress: est.serviceAddress || est.service_address || '',
    phone: (function(p){ var s=String(p!=null?p:''); return s; })(est.phone),
    email: est.email || '',
    staff: est.staff || '',
    workDate: est.workDate || est.work_date || '',
    workTime: est.workTime || est.work_time || '',
    no: est.no || est.estimate_no || '',
    expiry: est.expiry || '',
    notes: est.notes || '',
    subtotal: Number(est.subtotal || 0),
    tax: Number(est.tax || 0),
    grandTotal: total,
    grand: est.grand || fmt(total),
    items: Array.isArray(est.items) ? est.items : [],
    customerSign: est.customerSign || est.customer_sign || est['電子サイン'] || ''
  };
}

async function saveEstimate() {
  const d = getFormData();
  const total = items.reduce((s, i) => s + ((Number(i.qty) || 0) * (Number(i.price) || 0)), 0);
  const base = Math.round(total / 1.1);
  const tax = total - base;
  const recordId = editingRecordId || String(Date.now());
  const action = isEditingRemote() ? 'update' : 'save';

  const est = {
    id: recordId,
    action: action,
    date: new Date().toLocaleDateString('ja-JP'),
    items: JSON.parse(JSON.stringify(items)),
    subtotal: base,
    tax: tax,
    grandTotal: total,
    ...d
  };

  // サインはlocalStorageにIDをキーに別途保存（スプレッドシートのセル上限対策）
  if (customerSignDataUrl) {
    try { localStorage.setItem('sign_' + recordId, customerSignDataUrl); } catch(e) {}
  } else {
    try { localStorage.removeItem('sign_' + recordId); } catch(e) {}
  }
  // estオブジェクトのcustomerSignはlocalStorage参照用に空にしてもよいが
  // 端末保存（estimates配列）にはそのまま持たせる
  if (action === 'save') {
    estimates.unshift(est);
    currentHistorySource = 'local';
    try { localStorage.setItem('est_v2', JSON.stringify(estimates)); } catch(e) {}
    updateHistoryBadge();
  } else {
    const remoteIndex = remoteEstimates.findIndex(e => String(e.id) === String(recordId));
    if (remoteIndex >= 0) {
      remoteEstimates[remoteIndex] = { ...remoteEstimates[remoteIndex], ...est };
    }
  }

  if (!hasWebAppUrl()) {
    showToast(action === 'update' ? '更新内容は端末内にのみ保持されています。URL未設定です' : '端末保存のみ完了。URL未設定です');
    return { ok: false, id: String(recordId) };
  }

  try {
    const res = await fetch(WEB_APP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(est)
    });

    const data = await res.json();
    if (data.ok) {
      editingRecordId = String(recordId);
      if (action === 'update') {
        showToast('クラウド履歴を更新しました');
        await loadRemoteHistory(true);
      } else {
        showToast('保存しました（スプレッドシート連携済み）');
      }
      return { ok: true, id: String(recordId) };
    } else {
      showToast(action === 'update' ? 'クラウド更新に失敗しました' : '端末保存のみ完了。シート保存失敗');
      console.error(data);
      return { ok: false, id: String(recordId) };
    }
  } catch (error) {
    showToast(action === 'update' ? 'クラウド更新に失敗しました' : '端末保存のみ完了。通信失敗');
    console.error(error);
    return { ok: false, id: String(recordId) };
  }
}

function loadEstimate(id) {
  const source = getActiveHistoryRecords();
  const found = source.find(e => String(e.id) === String(id));
  if (!found) return;
  editingRecordId = String(found.id || '');
  editingRecordSource = currentHistorySource === 'remote' ? 'remote' : 'local';
  const est = normalizeLoadedEstimate(found);
  items = (est.items || []).length ? est.items.map(i => ({
    id: Date.now() + Math.random(),
    name: i.name || '',
    place: i.place || '',
    qty: Number(i.qty) || 0,
    price: Number(i.price) || 0
  })) : [{ id: 1, name: '', place: '', qty: 1, price: '' }];

  // draftState を先に更新しておくことで renderForm が復元できる
  draftState = {
    client:        est.client || '',
    clientAddress: est.clientAddress || '',
    serviceClient: est.serviceClient || '',
    serviceAddress:est.serviceAddress || '',
    phone:         (function(p){ return String(p!=null?p:''); })(est.phone),
    email:         est.email || '',
    staff:         est.staff || '',
    workDate:      est.workDate || '',
    workTime:      est.workTime || '',
    expiry:        est.expiry || '',
    notes:         est.notes || '',
    customerSign:  est.customerSign || ''
  };
  // クラウドデータはセル上限でサインが空になっている場合がある
  // → localStorageにIDをキーに保存したサインで補完
  const signFromStorage = (function(id) {
    try { return localStorage.getItem('sign_' + id) || ''; } catch(e) { return ''; }
  })(est.id);
  customerSignDataUrl = est.customerSign || signFromStorage || '';
  // localStorageにもなければ空
  switchTab('form');
  setTimeout(() => {
    if (document.getElementById('client')) {
      document.getElementById('client').value = draftState.client;
      document.getElementById('clientAddress').value = draftState.clientAddress;
      document.getElementById('serviceClient').value = draftState.serviceClient;
      document.getElementById('serviceAddress').value = draftState.serviceAddress;
      document.getElementById('phone').value = draftState.phone;
      updatePhoneLink();
      document.getElementById('email').value = draftState.email;
      updateEmailCopyState();
      document.getElementById('staff').value = draftState.staff;
      document.getElementById('workDate').value = draftState.workDate;
      document.getElementById('workTime').value = draftState.workTime;
      document.getElementById('expiry').value = draftState.expiry;
      document.getElementById('notes').value = draftState.notes;
      renderItems();
      calcTotals();
      // サイン済みステータス表示（パネルが閉じていても badge を出す）
      setTimeout(() => {
        updateSignStatus(!!customerSignDataUrl);
        // パネルが開いていれば描画も更新
        const panel = document.getElementById('sign-panel');
        if (panel && panel.style.display !== 'none') initSignCanvas();
      }, 100);
    }
  }, 50);
}


function handleHistoryOpen(ev, id) {
  if (ev) ev.stopPropagation();
  loadEstimate(String(id));
}

function handleHistoryDelete(ev, id) {
  if (ev) ev.stopPropagation();
  deleteEstimate(id);
}

function deleteEstimate(id) {
  if (!confirm('この見積を削除しますか？')) return;
  const targetId = String(id);
  estimates = estimates.filter(e => String(e.id) !== targetId);
  try { localStorage.setItem('est_v2', JSON.stringify(estimates)); } catch(e) {}
  renderHistory();
  updateHistoryBadge();
  showToast('端末保存データを削除しました');
}

function clearAllLocalEstimates() {
  if (!confirm('端末保存の履歴をすべて削除しますか？')) return;
  estimates = [];
  try { localStorage.removeItem('est_v2'); } catch(e) {}
  renderHistory();
  updateHistoryBadge();
  showToast('端末保存の履歴をすべて削除しました');
}

function updateHistoryBadge() {
  const localCount = estimates.length;
  const remoteCount = remoteEstimates.length;
  const n = currentHistorySource === 'remote' ? remoteCount : localCount;
  document.getElementById('tab-history-label').textContent = n > 0 ? `履歴 (${n})` : '履歴';
}


async function showCloudHistory() {
  if (!hasWebAppUrl()) {
    historyError = 'WebアプリURLが未設定です。';
    currentHistorySource = 'local';
    updateHistoryBadge();
    renderHistory();
    showToast('クラウド連携URLが未設定です');
    return;
  }
  currentHistorySource = 'remote';
  updateHistoryBadge();
  renderHistory();
  await loadRemoteHistory(true);
  if (remoteEstimates.length === 0 && historyError) {
    currentHistorySource = 'local';
    updateHistoryBadge();
    renderHistory();
  }
}

function renderHistory() {
  const c = document.getElementById('content');
  const rows = getActiveHistoryRecords();
  const isRemote = currentHistorySource === 'remote';

  if (historyLoading) {
    c.innerHTML = `
      <div class="history-tools">
        <button class="btn btn-secondary" onclick="currentHistorySource='local';renderHistory()">端末保存</button>
        <button class="btn btn-primary" disabled>クラウド読込中…</button>
      </div>
      <div class="empty">クラウド履歴を読み込んでいます</div>`;
    return;
  }

  const extraLocalAction = !isRemote && estimates.length ? '<button class="btn btn-secondary" onclick="clearAllLocalEstimates()">端末保存を全削除</button>' : '';
  const tools = `
    <div class="history-tools">
      <button class="btn ${isRemote ? 'btn-secondary' : 'btn-primary'}" onclick="currentHistorySource='local';updateHistoryBadge();renderHistory()">端末保存 (${estimates.length})</button>
      <button class="btn ${isRemote ? 'btn-primary' : 'btn-secondary'}" onclick="showCloudHistory()">クラウド履歴 (${remoteEstimates.length})</button>
    </div>
    ${extraLocalAction ? `<div class="history-tools">${extraLocalAction}</div>` : ''}
    <div class="history-note">クラウド履歴はボタンを押した時だけスプレッドシートから取得します。クリックで入力画面へ戻し、そのまま更新できます。</div>
    ${historyError ? `<div class="history-note">${escapeHtml(historyError)}</div>` : ''}
  `;

  if (rows.length === 0) {
    c.innerHTML = tools + '<div class="empty">保存された見積がありません</div>';
    return;
  }

  c.innerHTML = tools + rows.map(e => {
    const amount = fmt(num(e.grandTotal || e.grand_total || e.grand || e['税込合計'] || 0));
    const date = e.date || e.saved_date || '';
    const sourceChip = isRemote ? '<div class="status-chip">クラウド</div>' : '<div class="status-chip">端末</div>';
    const actionBtn = isRemote
      ? `<button class="btn-del-hist" onclick="handleHistoryOpen(event, '${escapeHtml(String(e.id))}')">開く</button>`
      : `<button class="btn-del-hist" onclick="handleHistoryDelete(event, '${escapeHtml(String(e.id))}')">削除</button>`;
    const savedAt = e.savedAt || e.timestamp || '';
    const updatedAt = e.updatedAt || '';
    const timeMeta = isRemote
      ? `保存: ${escapeHtml(savedAt || '未入力')} / 更新: ${escapeHtml(updatedAt || savedAt || '未入力')}`
      : `端末保存データ`;
    return `
      <div class="history-card" onclick="handleHistoryOpen(event, '${escapeHtml(String(e.id))}')">
        <div class="hc-left">
          ${sourceChip}
          <div class="client">${escapeHtml(e.client || '（ご契約お客様名なし）')}</div>
          <div class="date">${escapeHtml(date)}</div>
          <div class="history-meta">担当: ${escapeHtml(e.staff || '未入力')} / 作業日: ${escapeHtml(e.workDate || e.work_date || '未入力')}</div>
          <div class="history-meta">${timeMeta}</div>
        </div>
        <div class="hc-right">
          <div class="hc-amount">${amount}</div>
          ${actionBtn}
        </div>
      </div>`;
  }).join('');
}

async function saveBeforePrint(docType) {
  closePdfModal();

  if (!yes) return;
  const result = await saveEstimate();
  if (!result || !result.ok) {
    showToast('保存に失敗したためPDF共有を開けませんでした');
    return;
  }
  editingRecordId = String(result.id || editingRecordId || '');
  setTimeout(() => printEstimate(docType), 150);
}

function formatPhone(p) {
  const s = String(p || '').replace(/[^\d]/g, '');
  if (s.length === 11 && s[0] === '0') {
    // 携帯 090-XXXX-XXXX / 0120-XX-XXXX(フリーダイヤル)
    if (s.startsWith('0120') || s.startsWith('0800')) {
      return s.slice(0,4) + '-' + s.slice(4,6) + '-' + s.slice(6);
    }
    return s.slice(0,3) + '-' + s.slice(3,7) + '-' + s.slice(7);
  }
  if (s.length === 10 && s[0] === '0') {
    // 固定 03-XXXX-XXXX / 0567-XX-XXXX など
    if (s.startsWith('03') || s.startsWith('06')) {
      return s.slice(0,2) + '-' + s.slice(2,6) + '-' + s.slice(6);
    }
    // 4桁市外局番 0567-XX-XXXX
    return s.slice(0,4) + '-' + s.slice(4,7) + '-' + s.slice(7);
  }
  return p || '—'; // 変換できなければそのまま
}

function normalizeEmailForCopy(value) {
  return String(value || '').trim();
}

function updateEmailCopyState() {
  const input = document.getElementById('email');
  const link = document.getElementById('copy-email-link');
  if (!link) return;
  const enabled = !!normalizeEmailForCopy(input ? input.value : '');
  link.style.pointerEvents = enabled ? 'auto' : 'none';
  link.style.opacity = enabled ? '1' : '.5';
}

async function copyEmailAddress(ev) {
  if (ev) ev.preventDefault();
  const input = document.getElementById('email');
  const value = normalizeEmailForCopy(input ? input.value : '');
  if (!value) {
    showToast('メールアドレスが未入力です');
    updateEmailCopyState();
    return;
  }
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(value);
    } else {
      const temp = document.createElement('textarea');
      temp.value = value;
      temp.setAttribute('readonly', '');
      temp.style.position = 'fixed';
      temp.style.opacity = '0';
      document.body.appendChild(temp);
      temp.focus();
      temp.select();
      document.execCommand('copy');
      document.body.removeChild(temp);
    }
    showToast('メールアドレスをコピーしました');
  } catch (e) {
    showToast('コピーに失敗しました');
  }
  updateEmailCopyState();
}

function toggleSignPanel(ev) {
  if (ev) ev.preventDefault();
  const panel = document.getElementById('sign-panel');
  const arrow = document.getElementById('sign-toggle-arrow');
  if (!panel) return;
  const opening = panel.style.display === 'none';
  panel.style.display = opening ? '' : 'none';
  if (arrow) arrow.textContent = opening ? '▲' : '▼';
  if (opening) {
    // 開いた後にキャンバスを初期化（幅確定のため少し待つ）
    setTimeout(initSignCanvas, 80);
  }
}

function initSignCanvas() {
  const wrap = document.getElementById('sign-wrap');
  if (!wrap) return;

  // 既存キャンバスのイベントリスナーを全除去（cloneNode で完全リセット）
  const oldCanvas = document.getElementById('sign-canvas');
  if (!oldCanvas) return;
  const canvas = oldCanvas.cloneNode(false); // 属性だけコピー、内容はクリア
  oldCanvas.parentNode.replaceChild(canvas, oldCanvas);

  // 幅確定を待ってから初期化
  function setup() {
    const w = wrap.offsetWidth || 320;
    // サイズを変えるとピクセルがクリアされるので、変わる時だけ設定
    if (canvas.width !== w)  canvas.width  = w;
    if (canvas.height !== 160) canvas.height = 160;

    const placeholder = document.getElementById('sign-placeholder');
    const ctx = canvas.getContext('2d');

    // 既存サインを復元（履歴読み込み時など）
    if (customerSignDataUrl) {
      const img = new Image();
      img.onload = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      };
      img.src = customerSignDataUrl;
      if (placeholder) placeholder.style.opacity = '0';
      updateSignStatus(true);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (placeholder) placeholder.style.opacity = '1';
      updateSignStatus(false);
    }

    let drawing = false;
    let lastX = 0, lastY = 0;

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width  / rect.width;
      const scaleY = canvas.height / rect.height;
      if (e.touches) {
        return {
          x: (e.touches[0].clientX - rect.left) * scaleX,
          y: (e.touches[0].clientY - rect.top)  * scaleY
        };
      }
      return {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top)  * scaleY
      };
    }

    function startDraw(e) {
      e.preventDefault();
      drawing = true;
      const pos = getPos(e);
      lastX = pos.x; lastY = pos.y;
      ctx.beginPath();
      ctx.arc(lastX, lastY, 1.2, 0, Math.PI * 2);
      ctx.fillStyle = '#111827';
      ctx.fill();
      if (placeholder) placeholder.style.opacity = '0';
    }

    function moveDraw(e) {
      if (!drawing) return;
      e.preventDefault();
      const pos = getPos(e);
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(pos.x, pos.y);
      ctx.strokeStyle = '#111827';
      ctx.lineWidth = 2.2;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.stroke();
      lastX = pos.x; lastY = pos.y;
    }

    function endDraw(e) {
      if (!drawing) return;
      drawing = false;
      customerSignDataUrl = canvas.toDataURL('image/png');
      draftState.customerSign = customerSignDataUrl;
      updateSignStatus(true);
    }

    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove',  moveDraw,  { passive: false });
    canvas.addEventListener('touchend',   endDraw,   { passive: false });
    canvas.addEventListener('mousedown',  startDraw);
    canvas.addEventListener('mousemove',  moveDraw);
    canvas.addEventListener('mouseup',    endDraw);
    canvas.addEventListener('mouseleave', endDraw);
  }

  // offsetWidth が 0 のときは次フレームで再試行
  if (wrap.offsetWidth > 0) {
    setup();
  } else {
    requestAnimationFrame(() => { setup(); });
  }
}

function clearSign() {
  const canvas = document.getElementById('sign-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  customerSignDataUrl = '';
  draftState.customerSign = '';
  const placeholder = document.getElementById('sign-placeholder');
  if (placeholder) placeholder.style.opacity = '1';
  updateSignStatus(false);
}

function updateSignStatus(hasSigned) {
  const el = document.getElementById('sign-status');
  if (!el) return;
  el.innerHTML = hasSigned
    ? '<span class="sign-done-badge"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>サイン済み</span>'
    : '';
}

// ── iPad/タッチデバイス向けボタン押下フィードバック ──
(function() {
  const SELECTOR = '.btn,.btn-add,.btn-del,.btn-del-hist,.mini-btn,.tab-item,.history-card';
  function addPressing(e) {
    const el = e.target.closest(SELECTOR);
    if (!el) return;
    el.classList.add('pressing');
  }
  function removePressing(e) {
    // touchend/touchcancel は遅延して外す（視認できるように）
    const el = e.target.closest ? e.target.closest(SELECTOR) : null;
    if (el) {
      setTimeout(() => el.classList.remove('pressing'), 120);
    }
    // 念のため全部クリア
    setTimeout(() => {
      document.querySelectorAll('.pressing').forEach(x => x.classList.remove('pressing'));
    }, 200);
  }
  document.addEventListener('touchstart', addPressing, { passive: true });
  document.addEventListener('touchend',   removePressing, { passive: true });
  document.addEventListener('touchcancel',removePressing, { passive: true });
})();

// QRコードから開いた場合: URLパラメータを読んでPDFを自動表示
(async function handleQrLaunch() {
  const params = new URLSearchParams(location.search);
  const docType = params.get('docType');
  const targetId = String(params.get('id') || '').trim();
  const isPublic = params.get('public') === '1';
  const expires = params.get('expires');
  if (!docType) return;

  if (isPublic && expires) {
    const expiresTime = Date.parse(expires);
    if (!Number.isNaN(expiresTime) && Date.now() > expiresTime) {
      document.body.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#f8f9fa;color:#374151;font-family:-apple-system,Helvetica Neue,sans-serif;"><div style="background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:24px 20px;max-width:360px;width:100%;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,0.08);"><div style="font-size:16px;font-weight:700;margin-bottom:8px;">このQRコードの有効期限が切れています</div><div style="font-size:13px;color:#6b7280;">送信元へ再発行をご依頼ください。</div></div></div>';
      return;
    }
  }

  if (targetId && hasWebAppUrl()) {
    try {
      const joiner = WEB_APP_URL.includes('?') ? '&' : '?';
      const res = await fetch(
        WEB_APP_URL + joiner + 'mode=get&id=' + encodeURIComponent(targetId) + '&_ts=' + Date.now(),
        { cache: 'no-store' }
      );
      const data = await res.json();
      if (data.ok && data.estimate) {
        const est = normalizeLoadedEstimate(data.estimate);
        loadEstimateToForm(est);
        setTimeout(() => printEstimate(docType), 250);
        return;
      }
    } catch(e) {}
  }

  if (targetId) {
    const localAll = estimates.concat(remoteEstimates);
    const found = localAll.find(e => String(e.id) === String(targetId));
    if (found) {
      loadEstimateToForm(normalizeLoadedEstimate(found));
      setTimeout(() => printEstimate(docType), 400);
      return;
    }
  }

  if (isPublic) {
    document.body.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#f8f9fa;color:#374151;font-family:-apple-system,Helvetica Neue,sans-serif;"><div style="background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:24px 20px;max-width:360px;width:100%;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,0.08);"><div style="font-size:16px;font-weight:700;margin-bottom:8px;">PDFデータが見つかりません</div><div style="font-size:13px;color:#6b7280;">送信元でPDFを再出力してから、もう一度お試しください。</div></div></div>';
    return;
  }

  setTimeout(() => printEstimate(docType), 300);
})();

// フォームに見積データをセットするヘルパー（loadEstimateの簡易版）
function loadEstimateToForm(est) {
  editingRecordId = String(est.id || '');
  editingRecordSource = 'remote';
  if (Array.isArray(est.items) && est.items.length > 0) {
    items = est.items.map((it, i) => ({ ...it, id: i + 1 }));
  }
  draftState = {
    client: est.client || '',
    clientAddress: est.clientAddress || '',
    serviceClient: est.serviceClient || '',
    serviceAddress: est.serviceAddress || '',
    phone: String(est.phone || ''),
    email: est.email || '',
    staff: est.staff || '',
    workDate: est.workDate || '',
    workTime: est.workTime || '',
    expiry: est.expiry || '',
    notes: est.notes || '',
    customerSign: est.customerSign || ''
  };
  customerSignDataUrl = est.customerSign || '';
  render();
  // フォームのinputに値をセット
  const fields = ['client','clientAddress','serviceClient','serviceAddress','phone','email','staff','workDate','workTime','expiry','notes'];
  fields.forEach(k => {
    const el = document.getElementById(k);
    if (el) el.value = draftState[k] || '';
  });
  calcTotals();
}
